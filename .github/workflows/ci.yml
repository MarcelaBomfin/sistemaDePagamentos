
name: CI Pipeline

# Gatilhos
on:
  push:
    branches: [ "main" ]   # Execução por push
  workflow_dispatch:       # Execução manual
  schedule:                # Execução agendada
    - cron: "0 3 * * *"    # Todo dia às 03:00 UTC

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Baixar o código
      - name: Checkout do código
        uses: actions/checkout@v4

      # 2. Configurar ambiente (Node exemplo)
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # 3. Instalar dependências
      - name: Instalar dependências
        run: npm install

      # 4. Rodar testes + gerar relatório
      - name: Executar testes
        run: |
          npm test -- --coverage

      # 5. Salvar relatório como artefato
      - name: Publicar relatório
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-testes
          path: coverage/