name: CI - Sistema de Pagamentos

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Instalar dependências
        run: npm ci

      - name: Dar permissão ao Jest
        run: chmod +x node_modules/.bin/jest

      - name: Rodar testes
        run: npm test